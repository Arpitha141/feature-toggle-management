spring.application.name=feature-toggle-management

server.port=8080

#use in memory database
spring.datasource.url=jdbc:h2:mem:testdb
#driverclass
spring.datasource.driver-class=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password


spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

### --- H2 CONSOLE --- ###
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

### --- SWAGGER / OPENAPI --- ###
springdoc.swagger-ui.path=/swagger-ui.html

### --- ACTUATOR CONFIGURATION --- ###
# Expose the health and info endpoints to the web
management.endpoints.web.exposure.include=health,info

# Show full health details
management.endpoint.health.show-details=always

# Enable specific Info Contributors (crucial for preventing 404s in modern Spring Boot)
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

### --- STATIC INFO DATA --- ###
# This data will be returned when you hit /actuator/info
info.app.name=Feature Toggle API
info.app.description=Management system for deployment feature toggles.
info.app.version=1.0.0